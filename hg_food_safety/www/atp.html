{% extends "templates/web.html" %}

{% block head_include %}
{% set v = fs_asset_version %}

  "/assets/hg_food_safety/atp/lib/api.js":    "/assets/hg_food_safety/atp/lib/api.js?v={{ v }}",
  "/assets/hg_food_safety/atp/lib/dom.js":    "/assets/hg_food_safety/atp/lib/dom.js?v={{ v }}",

}}
</script>
<script>

</script>
